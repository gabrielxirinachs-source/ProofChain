app = 'proofchain-api'
primary_region = 'iad'

[env]
  ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health/live'
    protocol = 'http'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512