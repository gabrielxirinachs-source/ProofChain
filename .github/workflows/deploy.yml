
#
# Auto-deploy to Fly.io when code is pushed to main.
#
# This runs AFTER the CI workflow passes — you never deploy
# broken code automatically.
#
# Setup required (one-time):
#   1. Create account at fly.io
#   2. Run: fly auth token
#   3. Add the token to GitHub: Settings → Secrets → FLY_API_TOKEN

name: Deploy

on:
  push:
    branches: ["main"]

# Only run deploy after CI passes
jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: []          # Add "test" job name here once CI is in same file

    # Only deploy from main branch, not PRs
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # --remote-only: builds the Docker image on Fly's servers
        # (faster than building locally and uploading)