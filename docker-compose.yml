services:
  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://proofchain:proofchain@postgres:5432/proofchain
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENV=development
    volumes:
      - ./backend:/app        # Hot-reload: maps your local code into the container
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────
  # PostgreSQL + pgvector
  # pgvector lets Postgres store/query vector
  # embeddings — critical for semantic search
  # over evidence nodes.
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: proofchain
      POSTGRES_PASSWORD: proofchain
      POSTGRES_DB: proofchain
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofchain"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — used for:
  #   1. Caching /verify results (sub-second repeats)
  #   2. Rate limiting web retrieval
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: